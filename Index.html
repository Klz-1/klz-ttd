<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lumio">
<title>Lumio - Secure Task Manager</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f2f2f7;
    color: #000;
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
  }

  @media (prefers-color-scheme: dark) {
    body {
      background: #000;
      color: #fff;
    }
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* Setup Screen */
  .setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
    text-align: center;
  }

  .setup-logo {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #5856d6, #7c7aff);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin-bottom: 30px;
    color: white;
  }

  .setup-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .setup-subtitle {
    font-size: 16px;
    color: #8e8e93;
    margin-bottom: 40px;
  }

  .setup-form {
    width: 100%;
    max-width: 400px;
  }

  .input-group {
    margin-bottom: 20px;
    text-align: left;
  }

  .input-label {
    display: block;
    font-size: 14px;
    color: #8e8e93;
    margin-bottom: 8px;
  }

  .input-field {
    width: 100%;
    padding: 12px;
    border: 1px solid #d1d1d6;
    border-radius: 10px;
    font-size: 16px;
    background: white;
  }

  @media (prefers-color-scheme: dark) {
    .input-field {
      background: #1c1c1e;
      border-color: #48484a;
      color: white;
    }
  }

  .setup-btn {
    width: 100%;
    padding: 14px;
    background: #5856d6;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
  }

  .setup-info {
    margin-top: 30px;
    padding: 15px;
    background: rgba(88,86,214,0.1);
    border-radius: 10px;
    font-size: 14px;
    color: #5856d6;
  }

  @media (prefers-color-scheme: dark) {
    .setup-info {
      background: rgba(88,86,214,0.2);
    }
  }

  /* Main App */
  .main-app {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  .main-app.active {
    display: flex;
  }

  /* Header */
  header {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 0.5px solid rgba(0,0,0,0.1);
    padding: env(safe-area-inset-top) 16px 0 16px;
    padding-bottom: 12px;
  }

  @media (prefers-color-scheme: dark) {
    header {
      background: rgba(28,28,30,0.8);
      border-bottom-color: rgba(255,255,255,0.1);
    }
  }

  .header-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #5856d6, #7c7aff);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    padding: 8px 12px;
    background: #5856d6;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  /* Status Bar */
  .status-bar {
    background: rgba(88,86,214,0.1);
    padding: 8px 16px;
    font-size: 13px;
    color: #5856d6;
    text-align: center;
  }

  @media (prefers-color-scheme: dark) {
    .status-bar {
      background: rgba(88,86,214,0.2);
    }
  }

  .status-bar.error {
    background: rgba(255,59,48,0.1);
    color: #ff3b30;
  }

  /* Main Content */
  main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    padding-bottom: 100px;
  }

  /* Cards */
  .card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    transform: translateX(0);
  }

  @media (prefers-color-scheme: dark) {
    .card {
      background: #1c1c1e;
      box-shadow: none;
    }
  }

  .card:active {
    transform: scale(0.98);
  }

  .card-check {
    width: 24px;
    height: 24px;
    border: 2px solid #d1d1d6;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card.swiped .card-check {
    background: #34c759;
    border-color: #34c759;
  }

  .card.swiped .card-check::after {
    content: '✓';
    color: white;
    font-size: 14px;
  }

  .card-body {
    flex: 1;
    min-width: 0;
  }

  .card-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-meta {
    font-size: 14px;
    color: #8e8e93;
  }

  .badge {
    padding: 4px 10px;
    background: #5856d6;
    color: white;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .card.completing {
    animation: slideOut 0.3s forwards;
  }

  @keyframes slideOut {
    to {
      transform: translateX(100%);
      opacity: 0;
    }
  }

  /* Empty State */
  .empty {
    text-align: center;
    padding: 60px 20px;
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .empty-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .empty-text {
    color: #8e8e93;
    font-size: 16px;
  }

  /* Bottom Sheet */
  .sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 1000;
    max-height: 80vh;
  }

  @media (prefers-color-scheme: dark) {
    .sheet {
      background: #1c1c1e;
    }
  }

  .sheet.open {
    transform: translateY(0);
  }

  .sheet-handle {
    padding: 12px;
    text-align: center;
  }

  .sheet-bar {
    width: 40px;
    height: 4px;
    background: #d1d1d6;
    border-radius: 2px;
    margin: 0 auto;
  }

  .sheet-content {
    padding: 0 20px 20px;
    max-height: 60vh;
    overflow-y: auto;
  }

  .sheet-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .sheet-meta {
    color: #8e8e93;
    font-size: 15px;
    margin-bottom: 20px;
  }

  .sheet-body {
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .sheet-actions {
    display: flex;
    gap: 12px;
    padding: 16px 20px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    border-top: 0.5px solid rgba(0,0,0,0.1);
  }

  @media (prefers-color-scheme: dark) {
    .sheet-actions {
      border-top-color: rgba(255,255,255,0.1);
    }
  }

  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    background: #f2f2f7;
    color: #000;
  }

  @media (prefers-color-scheme: dark) {
    .btn {
      background: #2c2c2e;
      color: #fff;
    }
  }

  .btn-primary {
    background: #5856d6;
    color: white;
  }

  /* Backdrop */
  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    z-index: 999;
  }

  .backdrop.show {
    opacity: 1;
    visibility: visible;
  }

  /* Tabs */
  nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid rgba(0,0,0,0.1);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }

  @media (prefers-color-scheme: dark) {
    nav {
      background: rgba(28,28,30,0.95);
      border-top-color: rgba(255,255,255,0.1);
    }
  }

  .tabs {
    display: flex;
    gap: 12px;
  }

  .tab {
    flex: 1;
    padding: 12px;
    background: #f2f2f7;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    color: #8e8e93;
    cursor: pointer;
    transition: all 0.2s;
  }

  @media (prefers-color-scheme: dark) {
    .tab {
      background: #2c2c2e;
    }
  }

  .tab.active {
    background: #5856d6;
    color: white;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 20px;
    color: #8e8e93;
  }

  .skeleton {
    background: #f2f2f7;
    height: 80px;
    border-radius: 16px;
    margin-bottom: 12px;
    animation: pulse 1.5s infinite;
  }

  @media (prefers-color-scheme: dark) {
    .skeleton {
      background: #2c2c2e;
    }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Setup Screen -->
  <div class="setup-screen" id="setupScreen">
    <div class="setup-logo">✨</div>
    <h1 class="setup-title">Lumio Setup</h1>
    <p class="setup-subtitle">Connect to your Google Apps Script backend</p>
    
    <div class="setup-form">
      <div class="input-group">
        <label class="input-label">Apps Script URL</label>
        <input type="text" class="input-field" id="apiUrl" 
               placeholder="https://script.google.com/macros/s/.../exec">
      </div>
      
      <div class="input-group">
        <label class="input-label">Access Token</label>
        <input type="password" class="input-field" id="apiToken" 
               placeholder="Enter your access token">
      </div>
      
      <button class="setup-btn" onclick="saveSetup()">Connect & Continue</button>
      
      <div class="setup-info">
        ℹ️ Your credentials are stored locally in this browser only. 
        They are never sent to any external server except your own Google Apps Script.
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div class="main-app" id="mainApp">
    <header>
      <div class="header-content">
        <div class="header-left">
          <div class="logo-icon">✨</div>
          <div class="logo-text">Lumio</div>
        </div>
        <div class="header-actions">
          <button class="btn-icon" onclick="refresh()">↻</button>
          <button class="btn-icon" onclick="resetSetup()">⚙️</button>
        </div>
      </div>
    </header>

    <div class="status-bar" id="statusBar">Connected</div>

    <main>
      <div id="tasksView" class="view">
        <div class="loading">Loading tasks...</div>
      </div>
      <div id="notesView" class="view" style="display: none;">
        <div class="loading">Loading notes...</div>
      </div>
    </main>

    <nav>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('tasks')">Tasks</button>
        <button class="tab" onclick="switchTab('notes')">Notes</button>
      </div>
    </nav>

    <div class="backdrop" onclick="closeSheet()"></div>

    <div class="sheet" id="sheet">
      <div class="sheet-handle" onclick="closeSheet()">
        <div class="sheet-bar"></div>
      </div>
      <div class="sheet-content">
        <div class="sheet-title" id="sheetTitle"></div>
        <div class="sheet-meta" id="sheetMeta"></div>
        <div class="sheet-body" id="sheetBody"></div>
      </div>
      <div class="sheet-actions">
        <button class="btn" onclick="shareItem()">Share</button>
        <button class="btn btn-primary" id="sheetAction">Complete</button>
      </div>
    </div>
  </div>
</div>

<script>
// Secure Configuration Management
class SecureConfig {
  constructor() {
    this.storageKey = 'lumio_secure_config';
    this.config = this.load();
  }

  load() {
    try {
      const stored = localStorage.getItem(this.storageKey);
      if (stored) {
        // Decrypt if you want extra security (optional)
        return JSON.parse(stored);
      }
    } catch (e) {
      console.error('Failed to load config', e);
    }
    return null;
  }

  save(apiUrl, token) {
    // Basic validation
    if (!apiUrl || !apiUrl.startsWith('https://script.google.com/')) {
      throw new Error('Invalid Apps Script URL');
    }
    
    if (!token || token.length < 4) {
      throw new Error('Invalid token');
    }

    const config = {
      apiUrl: apiUrl.trim(),
      token: token.trim(),
      savedAt: new Date().toISOString()
    };

    // Store encrypted if needed (optional)
    localStorage.setItem(this.storageKey, JSON.stringify(config));
    this.config = config;
    return true;
  }

  clear() {
    localStorage.removeItem(this.storageKey);
    this.config = null;
  }

  isConfigured() {
    return this.config && this.config.apiUrl && this.config.token;
  }
}

// Global instances
const config = new SecureConfig();
let STATE = {
  currentView: 'tasks',
  tasks: [],
  notes: [],
  currentItem: null
};

// API Client
class SecureAPI {
  constructor() {
    this.lastError = null;
  }

  async call(endpoint, params = {}) {
    if (!config.isConfigured()) {
      throw new Error('Not configured');
    }

    const url = new URL(config.config.apiUrl);
    
    // For GET requests
    if (endpoint === 'getTasks' || endpoint === 'getNotes') {
      url.searchParams.append('view', endpoint.replace('get', '').toLowerCase());
      url.searchParams.append('token', config.config.token);
      
      try {
        const response = await fetch(url.toString());
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        this.lastError = error;
        throw error;
      }
    }
    
    // For POST requests (complete task)
    if (endpoint === 'completeTask') {
      const formData = new FormData();
      formData.append('token', config.config.token);
      formData.append('action', 'completeTask');
      formData.append('task_id', params.task_id);
      
      try {
        const response = await fetch(config.config.apiUrl, {
          method: 'POST',
          body: formData
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        this.lastError = error;
        throw error;
      }
    }
  }
}

const api = new SecureAPI();

// Setup Functions
function saveSetup() {
  const apiUrl = document.getElementById('apiUrl').value;
  const token = document.getElementById('apiToken').value;
  
  try {
    config.save(apiUrl, token);
    showMainApp();
    loadTasks();
  } catch (error) {
    alert('Setup failed: ' + error.message);
  }
}

function resetSetup() {
  if (confirm('This will clear your saved configuration. Continue?')) {
    config.clear();
    showSetupScreen();
  }
}

// UI Management
function showSetupScreen() {
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('mainApp').classList.remove('active');
}

function showMainApp() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('mainApp').classList.add('active');
  updateStatus('Connected', false);
}

function updateStatus(message, isError = false) {
  const bar = document.getElementById('statusBar');
  bar.textContent = message;
  bar.classList.toggle('error', isError);
}

// Data Loading
async function loadTasks() {
  const container = document.getElementById('tasksView');
  container.innerHTML = '<div class="loading">Loading tasks...</div>';
  
  try {
    const data = await api.call('getTasks');
    STATE.tasks = data.rows || [];
    renderTasks();
    updateStatus('Updated ' + new Date().toLocaleTimeString(), false);
  } catch (error) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">Failed to load tasks</div></div>';
    updateStatus('Connection failed', true);
  }
}

async function loadNotes() {
  const container = document.getElementById('notesView');
  container.innerHTML = '<div class="loading">Loading notes...</div>';
  
  try {
    const data = await api.call('getNotes');
    STATE.notes = data.rows || [];
    renderNotes();
    updateStatus('Updated ' + new Date().toLocaleTimeString(), false);
  } catch (error) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">Failed to load notes</div></div>';
    updateStatus('Connection failed', true);
  }
}

async function completeTask(taskId) {
  try {
    const result = await api.call('completeTask', { task_id: taskId });
    if (result.ok) {
      STATE.tasks = STATE.tasks.filter(t => t.task_id !== taskId);
      renderTasks();
      closeSheet();
      updateStatus('Task completed', false);
    } else {
      alert('Failed to complete task');
    }
  } catch (error) {
    alert('Error: ' + error.message);
  }
}

// Rendering
function renderTasks() {
  const container = document.getElementById('tasksView');
  
  if (!STATE.tasks.length) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✅</div>
        <div class="empty-title">All done!</div>
        <div class="empty-text">No pending tasks</div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = STATE.tasks.map(task => {
    const meta = [];
    if (task.owner) meta.push(task.owner);
    if (task.due_date_iso) meta.push(`Due ${task.due_date_iso}`);
    
    return `
      <div class="card" data-id="${task.task_id}">
        <div class="card-check"></div>
        <div class="card-body">
          <div class="card-title">${escapeHtml(task.action || 'Untitled')}</div>
          ${meta.length ? `<div class="card-meta">${escapeHtml(meta.join(' • '))}</div>` : ''}
        </div>
        <div class="badge">${escapeHtml(task.status || 'TODO')}</div>
      </div>
    `;
  }).join('');
  
  // Add event listeners
  document.querySelectorAll('#tasksView .card').forEach(card => {
    setupCardInteractions(card);
  });
}

function renderNotes() {
  const container = document.getElementById('notesView');
  
  if (!STATE.notes.length) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📝</div>
        <div class="empty-title">No notes</div>
        <div class="empty-text">Your notes will appear here</div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = STATE.notes.map((note, idx) => `
    <div class="card" data-idx="${idx}">
      <div class="card-body">
        <div class="card-title">${escapeHtml(note.title || 'Untitled')}</div>
        <div class="card-meta">${escapeHtml(note.created_at || '')}</div>
      </div>
      <div class="badge">NOTE</div>
    </div>
  `).join('');
  
  // Add click listeners
  document.querySelectorAll('#notesView .card').forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.idx);
      openNoteDetail(STATE.notes[idx]);
    });
  });
}

// Card Interactions
function setupCardInteractions(card) {
  let startX = 0;
  let currentX = 0;
  let isDragging = false;
  
  // Touch events for swipe
  card.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    isDragging = false;
  });
  
  card.addEventListener('touchmove', (e) => {
    currentX = e.touches[0].clientX;
    const diff = currentX - startX;
    
    if (diff > 10) {
      isDragging = true;
      card.style.transform = `translateX(${Math.min(diff, 100)}px)`;
      
      if (diff > 50) {
        card.classList.add('swiped');
      } else {
        card.classList.remove('swiped');
      }
    }
  });
  
  card.addEventListener('touchend', () => {
    const diff = currentX - startX;
    
    if (diff > 80) {
      card.classList.add('completing');
      setTimeout(() => {
        completeTask(card.dataset.id);
      }, 300);
    } else {
      card.style.transform = '';
      card.classList.remove('swiped');
      
      if (!isDragging) {
        const task = STATE.tasks.find(t => t.task_id === card.dataset.id);
        if (task) openTaskDetail(task);
      }
    }
  });
  
  // Click for desktop
  card.addEventListener('click', (e) => {
    if (!isDragging) {
      const task = STATE.tasks.find(t => t.task_id === card.dataset.id);
      if (task) openTaskDetail(task);
    }
  });
}

// Sheet Functions
function openTaskDetail(task) {
  STATE.currentItem = task;
  
  document.getElementById('sheetTitle').textContent = task.action || 'Task';
  
  const meta = [];
  if (task.owner) meta.push(task.owner);
  if (task.due_date_iso) meta.push(`Due ${task.due_date_iso}`);
  if (task.priority) meta.push(`Priority: ${task.priority}`);
  document.getElementById('sheetMeta').textContent = meta.join(' • ');
  
  document.getElementById('sheetBody').textContent = task.transcript_snippet || '';
  
  const btn = document.getElementById('sheetAction');
  btn.textContent = 'Complete';
  btn.onclick = () => completeTask(task.task_id);
  
  openSheet();
}

function openNoteDetail(note) {
  STATE.currentItem = note;
  
  document.getElementById('sheetTitle').textContent = note.title || 'Note';
  document.getElementById('sheetMeta').textContent = note.created_at || '';
  document.getElementById('sheetBody').textContent = note.summary || '';
  
  const btn = document.getElementById('sheetAction');
  btn.textContent = 'Done';
  btn.onclick = closeSheet;
  
  openSheet();
}

function openSheet() {
  document.getElementById('sheet').classList.add('open');
  document.querySelector('.backdrop').classList.add('show');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.querySelector('.backdrop').classList.remove('show');
}

function shareItem() {
  if (!STATE.currentItem) return;
  const text = STATE.currentItem.action || STATE.currentItem.title || '';
  
  if (navigator.share) {
    navigator.share({ text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
    alert('Copied to clipboard!');
  }
}

// Tab Switching
function switchTab(view) {
  STATE.currentView = view;
  
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  if (view === 'tasks') {
    document.getElementById('tasksView').style.display = 'block';
    document.getElementById('notesView').style.display = 'none';
    if (!STATE.tasks.length) loadTasks();
  } else {
    document.getElementById('notesView').style.display = 'block';
    document.getElementById('tasksView').style.display = 'none';
    if (!STATE.notes.length) loadNotes();
  }
}

function refresh() {
  STATE.currentView === 'tasks' ? loadTasks() : loadNotes();
}

// Helper
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

// Initialize
window.addEventListener('load', () => {
  if (config.isConfigured()) {
    // Load saved URL for convenience
    document.getElementById('apiUrl').value = config.config.apiUrl;
    showMainApp();
    loadTasks();
  } else {
    showSetupScreen();
  }
});

// Optional: Add PWA support
if ('serviceWorker' in navigator) {
  // Register service worker for offline support
}
</script>
