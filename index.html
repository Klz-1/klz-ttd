<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Lumio Tasks</title>

<!-- iOS add-to-home-screen niceties -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lumio Tasks">

<style>
  :root { --fg:#0b0b0b; --bg:#fff; --muted:#6b7280; --sep:#e5e7eb; --accent:#2563eb; --ok:#059669; --warn:#b45309; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { margin:0; font:16px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "Noto Sans"; color:var(--fg); background:var(--bg); }

  header { position:sticky; top:0; z-index:5; backdrop-filter:saturate(1.2) blur(8px);
           background:rgba(255,255,255,.85); border-bottom:1px solid var(--sep); }
  .bar { max-width:800px; margin:0 auto; display:flex; align-items:center; gap:10px; padding:12px; }
  h1 { font-size:18px; font-weight:700; margin:0; }
  .grow { flex:1; }
  .btn { appearance:none; border:1px solid var(--sep); background:#fff; color:var(--fg);
         padding:8px 10px; border-radius:10px; font-weight:600; cursor:pointer; }
  .btn.primary { border-color:var(--accent); color:var(--accent); }
  .tabs { display:flex; gap:8px; }
  .tab { padding:6px 10px; border:1px solid var(--sep); border-radius:999px; font-size:13px; color:var(--muted); cursor:pointer; }
  .tab.active { border-color:var(--accent); color:var(--accent); }

  main { max-width:800px; margin:0 auto; padding:8px 12px 32px; }
  .list .item { position:relative; display:flex; align-items:center; gap:12px; padding:14px 12px; background:#fff;
                border:1px solid var(--sep); border-radius:14px; margin:10px 0; overflow:hidden; }
  .item .meta { flex:1; min-width:0; }
  .title { font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sub { color:var(--muted); font-size:13px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pill { font-size:12px; padding:2px 8px; border-radius:999px; border:1px solid var(--sep); color:var(--muted); }
  .item.done { opacity:.35; }
  
  /* Checkbox styles */
  .checkbox {
    width: 24px;
    height: 24px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    background: #fff;
  }
  .checkbox:hover {
    background: rgba(37, 99, 235, 0.05);
    transform: scale(1.05);
  }
  .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox.checked::after {
    content: '✓';
    color: white;
    font-size: 16px;
    font-weight: bold;
  }
  .item.completing {
    animation: slideOut 0.3s ease forwards;
  }
  @keyframes slideOut {
    to {
      transform: translateX(20px);
      opacity: 0;
    }
  }

  .detail { display:none; padding:8px; }
  .back { color:var(--accent); font-weight:700; cursor:pointer; display:inline-block; margin:8px 0 12px; }
  .d-title { font-size:18px; font-weight:800; margin:0 0 6px; }
  .d-meta { color:var(--muted); font-size:14px; }
  .d-snippet { margin-top:12px; }

  .toast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
           background:#111; color:#fff; padding:10px 12px; border-radius:999px; font-size:14px; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }

  .empty { color:var(--muted); text-align:center; padding:28px 10px; }
  .loading { color:var(--muted); text-align:center; padding:28px 10px; }
  .error { color:#dc2626; text-align:center; padding:28px 10px; }
</style>
</head>
<body>

<header>
  <div class="bar">
    <h1>Lumio</h1>
    <div class="tabs">
      <div id="tabTasks" class="tab active">Tasks</div>
      <div id="tabNotes" class="tab">Notes</div>
    </div>
    <div class="grow"></div>
    <button id="addTaskBtn" class="btn primary">+ Add</button>
    <button id="refreshBtn" class="btn">Refresh</button>
  </div>
</header>

<main>
  <!-- TASKS LIST -->
  <section id="viewTasks" class="list">
    <div class="loading">Loading tasks...</div>
  </section>

  <!-- NOTES LIST -->
  <section id="viewNotes" class="list" style="display:none;">
    <div class="loading">Loading notes...</div>
  </section>

  <!-- DETAIL VIEW (shared) -->
  <section id="detail" class="detail">
    <div class="back" id="backBtn">← Back</div>
    <h2 id="dTitle" class="d-title"></h2>
    <div id="dMeta" class="d-meta"></div>
    <p id="dSnippet" class="d-snippet"></p>
    <div id="dActions" style="margin-top:16px;"></div>
  </section>
</main>

<div id="toast" class="toast"></div>

<script>
// CONFIGURATION - Update these with your n8n webhook URLs
const API_CONFIG = {
  // Replace these with your actual n8n webhook URLs after importing the workflow
  GET_TASKS_URL: 'https://n8n.chouseservice.com/webhook/get-tasks',
  GET_NOTES_URL: 'https://n8n.chouseservice.com/webhook/get-notes',
  COMPLETE_TASK_URL: 'https://n8n.chouseservice.com/webhook/complete-task',
  SECRET: 'klz-ttd'
};

let STATE = { tasks: [], notes: [], mode: 'tasks', current: null };

const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

function toast(msg) {
  const t = $('#toast'); 
  t.textContent = msg; 
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

function escapeHtml(s='') {
  return s.replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// API calls using fetch instead of google.script.run
async function loadTasks() {
  const wrap = $('#viewTasks');
  wrap.innerHTML = '<div class="loading">Loading tasks...</div>';
  
  try {
    const response = await fetch(API_CONFIG.GET_TASKS_URL);
    if (!response.ok) throw new Error('Failed to fetch tasks');
    
    const data = await response.json();
    STATE.tasks = data.rows || [];
    renderTasks();
  } catch (err) {
    console.error('Failed to load tasks:', err);
    wrap.innerHTML = '<div class="error">Failed to load tasks. Please check your connection.</div>';
    toast('Failed to load tasks');
  }
}

async function loadNotes() {
  const wrap = $('#viewNotes');
  wrap.innerHTML = '<div class="loading">Loading notes...</div>';
  
  try {
    const response = await fetch(API_CONFIG.GET_NOTES_URL);
    if (!response.ok) throw new Error('Failed to fetch notes');
    
    const data = await response.json();
    STATE.notes = data.rows || [];
    renderNotes();
  } catch (err) {
    console.error('Failed to load notes:', err);
    wrap.innerHTML = '<div class="error">Failed to load notes. Please check your connection.</div>';
    toast('Failed to load notes');
  }
}

async function completeTask(task_id) {
  try {
    const response = await fetch(API_CONFIG.COMPLETE_TASK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        task_id: task_id,
        secret: API_CONFIG.SECRET
      })
    });
    
    if (!response.ok) throw new Error('Failed to complete task');
    
    const result = await response.json();
    if (result.ok) {
      toast('Marked done');
      return true;
    } else {
      toast('Failed to update');
      return false;
    }
  } catch (err) {
    console.error('Failed to complete task:', err);
    toast('Failed to update');
    return false;
  }
}

/* ---------- RENDERERS ---------- */
function renderTasks() {
  $('#detail').style.display = 'none';
  $('#viewNotes').style.display = 'none';
  const wrap = $('#viewTasks');
  wrap.style.display = 'block';
  wrap.innerHTML = '';

  if (!STATE.tasks.length) {
    wrap.innerHTML = `<div class="empty">No open tasks. Enjoy the calm ✨</div>`;
    return;
  }

  STATE.tasks.forEach((t, idx) => {
    const el = document.createElement('div');
    el.className = 'item';
    el.dataset.index = idx;
    el.dataset.taskId = t.task_id;

    // Create checkbox element
    const checkbox = document.createElement('div');
    checkbox.className = 'checkbox';
    checkbox.addEventListener('click', async (e) => {
      e.stopPropagation(); // Prevent opening detail view
      checkbox.classList.add('checked');
      el.classList.add('completing');
      
      // Wait for animation
      setTimeout(async () => {
        const success = await completeTask(t.task_id);
        if (success) {
          STATE.tasks = STATE.tasks.filter(x => x.task_id !== t.task_id);
          renderTasks();
        } else {
          // Reset if failed
          checkbox.classList.remove('checked');
          el.classList.remove('completing');
        }
      }, 300);
    });

    // Click on item (not checkbox) opens detail
    el.addEventListener('click', (e) => {
      if (!e.target.classList.contains('checkbox')) {
        openTaskDetail(t);
      }
    });

    // Optional: Keep swipe for mobile users
    let startX = 0, swiped = false;
    el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; swiped = false; });
    el.addEventListener('touchmove', e => {
      const dx = Math.max(0, e.touches[0].clientX - startX);
      el.style.transform = `translateX(${dx}px)`;
      if (dx > 100) swiped = true;
    });
    el.addEventListener('touchend', async e => {
      el.style.transform = 'translateX(0)';
      if (swiped) {
        el.classList.add('completing');
        setTimeout(async () => {
          const success = await completeTask(t.task_id);
          if (success) {
            STATE.tasks = STATE.tasks.filter(x => x.task_id !== t.task_id);
            renderTasks();
          } else {
            el.classList.remove('completing');
          }
        }, 300);
      }
    });

    el.innerHTML = `
      <div class="meta">
        <div class="title">${escapeHtml(t.action || '(no action)')}</div>
        <div class="sub">
          ${escapeHtml(t.owner || '')}
          ${t.due_date_iso ? ' • Due ' + escapeHtml(t.due_date_iso) : ''}
          ${t.priority ? ' • ' + escapeHtml(t.priority) : ''}
        </div>
      </div>
      <span class="pill">${escapeHtml(t.status || 'todo')}</span>
    `;
    
    // Append checkbox to the right
    el.appendChild(checkbox);
    wrap.appendChild(el);
  });
}

function renderNotes() {
  $('#detail').style.display = 'none';
  $('#viewTasks').style.display = 'none';
  const wrap = $('#viewNotes');
  wrap.style.display = 'block';
  wrap.innerHTML = '';

  if (!STATE.notes.length) {
    wrap.innerHTML = `<div class="empty">No notes yet. Record a quick brain dump 🎙️</div>`;
    return;
  }

  STATE.notes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'item';
    el.addEventListener('click', () => openNoteDetail(n));
    el.innerHTML = `
      <div class="meta">
        <div class="title">${escapeHtml(n.title || '(note)')}</div>
        <div class="sub">${escapeHtml(n.created_at || '')}</div>
      </div>
      <span class="pill">note</span>
    `;
    wrap.appendChild(el);
  });
}

/* ---------- DETAIL VIEWS ---------- */
function openTaskDetail(t) {
  STATE.current = { type:'task', data:t };
  $('#viewTasks').style.display = 'none';
  $('#viewNotes').style.display = 'none';
  $('#detail').style.display = 'block';

  $('#dTitle').textContent = t.action || '(no action)';
  $('#dMeta').textContent = [
    t.owner || '',
    t.due_date_iso ? `Due ${t.due_date_iso}` : '',
    t.priority || '',
  ].filter(Boolean).join(' • ');
  $('#dSnippet').textContent = t.transcript_snippet || '';

  $('#dActions').innerHTML = `
    <button class="btn" onclick="shareText('${encodeURIComponent(t.action || '')}')">Share</button>
    <button class="btn" onclick="openLink('${(t.transcript_uri||'').replace(/'/g,'%27')}')">Transcript</button>
    <button class="btn primary" onclick="completeAndBack('${(t.task_id||'').replace(/'/g,'%27')}')">Mark done</button>
  `;
}

function openNoteDetail(n) {
  STATE.current = { type:'note', data:n };
  $('#viewTasks').style.display = 'none';
  $('#viewNotes').style.display = 'none';
  $('#detail').style.display = 'block';

  $('#dTitle').textContent = n.title || '(note)';
  $('#dMeta').textContent  = n.created_at || '';
  $('#dSnippet').textContent = n.summary || '';

  $('#dActions').innerHTML = `
    <button class="btn" onclick="shareText('${encodeURIComponent(n.summary || n.title || '')}')">Share</button>
    <button class="btn" onclick="openLink('${(n.transcript_uri||'').replace(/'/g,'%27')}')">Transcript</button>
  `;
}

/* ---------- ACTIONS ---------- */
async function completeAndBack(task_id) {
  const success = await completeTask(task_id);
  if (success) {
    // remove from list immediately
    STATE.tasks = STATE.tasks.filter(x => x.task_id !== task_id);
    $('#detail').style.display = 'none';
    if (STATE.mode === 'tasks') { 
      $('#viewTasks').style.display = 'block'; 
      renderTasks(); 
    } else { 
      $('#viewNotes').style.display = 'block'; 
    }
  }
}

function openLink(url) {
  if (!url) { toast('No link'); return; }
  window.open(url, '_blank', 'noopener');
}

function shareText(encoded) {
  const text = decodeURIComponent(encoded || '');
  if (navigator.share) {
    navigator.share({ text }).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(text);
    toast('Copied');
  }
}

/* ---------- NAV / EVENTS ---------- */
$('#backBtn').onclick = () => {
  $('#detail').style.display = 'none';
  if (STATE.mode === 'tasks') { 
    $('#viewTasks').style.display = 'block'; 
  } else { 
    $('#viewNotes').style.display = 'block'; 
  }
};

$('#refreshBtn').onclick = async () => {
  if (STATE.mode === 'tasks') {
    await loadTasks(); 
  } else {
    await loadNotes();
  }
};

$('#addTaskBtn').onclick = () => {
  // This will invoke your iOS shortcut
  window.location.href = 'shortcuts://run-shortcut?name=Jarvis';
};

$('#tabTasks').onclick = async () => {
  STATE.mode = 'tasks';
  $('#tabTasks').classList.add('active'); 
  $('#tabNotes').classList.remove('active');
  await loadTasks();
};

$('#tabNotes').onclick = async () => {
  STATE.mode = 'notes';
  $('#tabNotes').classList.add('active'); 
  $('#tabTasks').classList.remove('active');
  await loadNotes();
};

// Edge-swipe to go back from detail (left-to-right)
(function enableBackSwipe(){
  let sx=0, sy=0, tracking=false;
  document.addEventListener('touchstart', e=>{
    if ($('#detail').style.display !== 'block') return;
    const t = e.touches[0]; 
    sx = t.clientX; 
    sy = t.clientY; 
    tracking = sx < 30; // left edge
  }, {passive:true});
  document.addEventListener('touchmove', e=>{
    if (!tracking) return;
    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;
    if (Math.abs(dy) > 40) tracking = false;
    if (dx > 80) { 
      $('#backBtn').click(); 
      tracking=false; 
    }
  }, {passive:true});
})();

/* ---------- BOOT ---------- */
(async function init(){
  // Check if API URLs are configured
  if (API_CONFIG.GET_TASKS_URL.includes('YOUR-N8N-DOMAIN')) {
    const wrap = $('#viewTasks');
    wrap.innerHTML = `
      <div class="error">
        <p><strong>Setup Required:</strong></p>
        <p>Please update the API_CONFIG at the top of this HTML file with your n8n webhook URLs.</p>
        <p>1. Import the web-app-api.json workflow into n8n</p>
        <p>2. Activate the workflow</p>
        <p>3. Copy the webhook URLs from each webhook node</p>
        <p>4. Update API_CONFIG in this file</p>
      </div>
    `;
    return;
  }
  
  await loadTasks();
})();
</script>
</body>
</html>
